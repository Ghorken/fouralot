name: fouralot
description: 4alot

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.5+1
  google_fonts: ^8.0.2
  animate_do: ^4.2.0
  flutter_animate: ^4.5.2
  mqtt_client: ^10.11.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/app_icon.png
    background_color: "#0F0C29"
    theme_color: "#302B63"
  windows:
    generate: true
    image_path: assets/app_icon.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/app_icon.png
